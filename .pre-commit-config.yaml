# Pre-commit hook: auto-format non-Rust files with Prettier.
# Rust formatting is handled by rustfmt via the toolchain.
repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        pass_filenames: true
